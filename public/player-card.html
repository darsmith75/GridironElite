<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Card</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body {
      background: #000000;
      margin: 0;
      padding: 20px;
      font-family: 'Arial Black', Arial, sans-serif;
    }
    
    .card-container {
      max-width: 1200px;
      margin: 0 auto;
      background: url('/images/PlayerCardBackground.png') no-repeat center center;
      background-size: cover;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      position: relative;
    }
    
    .card-header {
      background: rgba(26, 41, 66, 0.65);
      padding: 30px 40px;
      color: white;
      position: relative;
    }
    
    .card-header h1 {
      margin: 0;
      font-family: 'Russo One', 'Arial Black', sans-serif;
      font-size: 52px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: white;
      text-shadow: 0 0 20px rgba(42, 82, 152, 0.8), 0 0 40px rgba(42, 82, 152, 0.4), 2px 2px 4px rgba(0,0,0,0.5);
      padding-bottom: 15px;
      border-bottom: 3px solid rgba(255,255,255,0.2);
    }
    
    .card-header .player-meta {
      margin-top: 12px;
      font-family: 'Oswald', 'Arial', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.9;
      color: white;
    }
    
    .card-header .player-meta span {
      margin-right: 20px;
      color: white;
    }
    
    .card-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    
    .card-left {
      padding: 40px;
      background: rgba(26, 41, 66, 0.65);
    }
    
    .card-right {
      padding: 0;
      position: relative;
      background: rgba(26, 41, 66, 0.65);
      display: flex;
      flex-direction: column;
    }
    
    .card-right-content {
      padding: 40px;
    }
    
    .player-image-container {
      width: 100%;
      min-height: 500px;
      overflow: hidden;
      background-color: #0d1829;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      border-radius: 10px;
    }
    
    .section-title {
      background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
      color: white;
      padding: 12px 20px;
      margin: 0 0 15px 0;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 8px;
    }
    
    .card-right .section-title {
      margin: 0 0 15px 0;
    }
    
    .info-list {
      margin-bottom: 30px;
      padding: 0 20px;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    
    .info-row:last-child {
      border-bottom: none;
    }
    
    .info-label {
      font-size: 13px;
      color: #8899aa;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .info-value {
      font-size: 16px;
      color: white;
      font-weight: 900;
      text-align: right;
    }
    
    .college-offers {
      margin-bottom: 30px;
      padding: 0 20px;
    }
    
    .offers-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-top: 15px;
    }
    
    .offer-logo {
      background: white;
      padding: 10px;
      border-radius: 8px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .offer-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .additional-offers {
      margin-top: 15px;
      color: #8899aa;
      font-size: 13px;
      font-weight: 700;
    }
    
    .contact-section {
      padding: 0 20px 15px 20px;
    }
    
    .card-right .contact-section {
      padding: 0;
    }
    
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }
    
    .contact-item {
      color: white;
      font-size: 13px;
      line-height: 1.5;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    
    .contact-item:last-child {
      border-bottom: none;
    }
    
    .contact-item strong {
      color: #6b8cce;
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    
    .social-section {
      padding: 0 20px 20px 20px;
    }
    
    .social-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }
    
    .social-item {
      color: white;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    
    .social-item:last-child {
      border-bottom: none;
    }
    
    .social-item .social-logo {
      width: 20px;
      height: 20px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }
    
    .social-item strong {
      color: #6b8cce;
      min-width: 80px;
    }
    
    .gpa-badge {
      background: #ffa500;
      color: #0a1628;
      padding: 12px 25px;
      text-align: center;
      margin: 15px auto;
      display: inline-block;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(255,165,0,0.4);
    }
    
    .gpa-badge-wrapper {
      text-align: center;
    }
    
    .gpa-badge .label {
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .gpa-badge .value {
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      margin-top: 5px;
    }
    
    .gpa-badge .honors {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      margin-top: 5px;
      letter-spacing: 0.5px;
    }
    
    .button-bar {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }
    
    .card-btn {
      padding: 10px 20px;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Oswald', 'Arial', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .card-btn .btn-icon {
      font-size: 16px;
    }
    
    .btn-back {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      position: fixed;
      top: 20px;
      left: 20px;
    }
    
    .btn-back:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
      transform: translateX(-3px);
    }
    
    .btn-export {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      box-shadow: 0 4px 15px rgba(30, 60, 114, 0.4);
    }
    
    .btn-export:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(30, 60, 114, 0.6);
      background: linear-gradient(135deg, #2a5298 0%, #3a6cc8 100%);
    }
    
    .btn-export:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-email {
      background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
      box-shadow: 0 4px 15px rgba(13, 110, 253, 0.4);
    }

    .btn-email:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(13, 110, 253, 0.6);
      background: linear-gradient(135deg, #0d6efd 0%, #31d2f2 100%);
    }

    .btn-email:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-preview {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
    }
    
    .btn-preview:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }
    
    .preview-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .preview-modal-content {
      background: white;
      border-radius: 12px;
      max-width: 90%;
      max-height: 90%;
      overflow: auto;
    }
    
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .preview-header h3 {
      margin: 0;
      color: #333;
    }
    
    .close-preview {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #666;
      padding: 0;
      width: 30px;
      height: 30px;
    }
    
    .preview-body {
      padding: 20px;
      text-align: center;
    }
    
    .preview-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 20px;
      border-top: 1px solid #e0e0e0;
    }
    
    .preview-cancel-btn {
      padding: 10px 20px;
      background: #f5f5f5;
      color: #333;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .preview-export-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    
    @media print {
      body {
        background: white;
      }
      .btn-back,
      .button-bar {
        display: none;
      }
      .card-container {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <button onclick="goBack()" class="card-btn btn-back"><span class="btn-icon">←</span> Back</button>
  <div class="button-bar">
    <button onclick="previewImage()" class="card-btn btn-preview" id="previewBtn"><span class="btn-icon">👁</span> Preview</button>
    <button onclick="exportAsImage()" class="card-btn btn-export" id="exportBtn"><span class="btn-icon">📸</span> Export</button>
    <button onclick="openEmailModal()" class="card-btn btn-email" id="emailBtn"><span class="btn-icon">✉️</span> Email</button>
  </div>
  
  <!-- Email Modal -->
  <div id="emailModal" class="preview-modal" style="display: none;">
    <div class="preview-modal-content" style="max-width: 480px;">
      <div class="preview-header">
        <h3>Email Player Card</h3>
        <button onclick="closeEmailModal()" class="close-preview">✕</button>
      </div>
      <div class="preview-body" style="padding: 20px;">
        <div style="margin-bottom: 15px;">
          <label style="display: block; color: #ccc; margin-bottom: 5px; font-size: 14px;">Recipient Email *</label>
          <input type="email" id="emailTo" placeholder="recipient@example.com" style="width: 100%; padding: 10px 12px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: white; font-size: 14px; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 15px;">
          <label style="display: block; color: #ccc; margin-bottom: 5px; font-size: 14px;">Subject</label>
          <input type="text" id="emailSubject" placeholder="Player Card" style="width: 100%; padding: 10px 12px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: white; font-size: 14px; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 15px;">
          <label style="display: block; color: #ccc; margin-bottom: 5px; font-size: 14px;">Message</label>
          <textarea id="emailMessage" rows="3" placeholder="Optional message..." style="width: 100%; padding: 10px 12px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: white; font-size: 14px; resize: vertical; box-sizing: border-box;"></textarea>
        </div>
        <p style="color: #94a3b8; font-size: 12px; margin: 0;">The player card image will be attached to the email.</p>
      </div>
      <div class="preview-footer">
        <button onclick="closeEmailModal()" class="preview-cancel-btn">Cancel</button>
        <button onclick="sendPlayerCardEmail()" id="sendEmailBtn" class="preview-export-btn" style="background: linear-gradient(135deg, #1e3c72, #2a5298);">Send Email</button>
      </div>
    </div>
  </div>

  <!-- Preview Modal -->
  <div id="previewModal" class="preview-modal" style="display: none;">
    <div class="preview-modal-content">
      <div class="preview-header">
        <h3>Export Preview</h3>
        <button onclick="closePreview()" class="close-preview">✕</button>
      </div>
      <div class="preview-body">
        <img id="previewImage" src="" alt="Preview" style="max-width: 100%; max-height: 70vh; border-radius: 8px;">
      </div>
      <div class="preview-footer">
        <button onclick="closePreview()" class="preview-cancel-btn">Close</button>
        <button onclick="exportFromPreview()" class="preview-export-btn">Export This Image</button>
      </div>
    </div>
  </div>
  
  <div class="card-container" id="playerCard">
    <div class="card-header">
      <h1 id="playerName">Loading...</h1>
      <div class="player-meta">
        <span id="playerYear"></span>
        <span id="playerPosition"></span>
        <span id="playerHeight"></span>
        <span id="playerWeight"></span>
        <span id="playerSchool"></span>
      </div>
    </div>
    
    <div class="card-body">
      <div class="card-left">
        <div class="section-title">VERIFIED MEASURABLES</div>
        <div class="info-list" id="measurables"></div>
        
        <div class="college-offers" id="offersSection" style="display: none;">
          <div class="section-title">POWER 5 OFFERS</div>
          <div class="offers-grid" id="collegeOffers"></div>
          <div class="additional-offers" id="additionalOffers"></div>
        </div>
        
        <div class="social-section">
          <div class="section-title">SOCIAL</div>
          <div class="social-grid" id="socialInfo"></div>
        </div>
      </div>
      
      <div class="card-right">
        <div class="card-right-content">
          <div class="player-image-container" id="playerImageContainer"></div>
          <div class="gpa-badge-wrapper">
            <div class="gpa-badge" id="gpaBadge" style="display: none;">
              <div class="label">GPA</div>
              <div class="value" id="gpaValue"></div>
              <div class="honors">HIGH HONORS</div>
            </div>
          </div>
        
          <div class="contact-section">
            <div class="section-title">CONTACT</div>
            <div class="contact-grid" id="contactInfo"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Check authentication - allow both agents and players
    let previewObjectUrl = null;

    fetch('/api/user')
      .then(res => {
        if (!res.ok) {
          window.location.href = '/';
          throw new Error('Not authenticated');
        }
        return res.json();
      })
      .then(user => {
        const urlParams = new URLSearchParams(window.location.search);
        const playerId = urlParams.get('id');
        
        // If no ID provided and user is an agent, redirect to dashboard
        if (!playerId && user.role === 'agent') {
          window.location.href = 'agent-dashboard.html';
          return;
        }
        
        // Load the card
        loadPlayerCard(playerId);
      })
      .catch(() => {
        // Authentication failed, redirect handled above
      });
    
    function goBack() {
      const urlParams = new URLSearchParams(window.location.search);
      const playerId = urlParams.get('id');
      
      if (playerId) {
        window.location.href = `player-detail.html?id=${playerId}`;
      } else {
        window.location.href = 'player-profile.html';
      }
    }
    
    async function loadPlayerCard(playerId) {
      // Fetch player data - use different endpoint based on whether viewing own card or another player's
      let res;
      if (playerId) {
        // Agent viewing a specific player
        res = await fetch(`/api/agent/player/${playerId}`);
      } else {
        // Player viewing their own card
        res = await fetch('/api/player/profile');
      }
      
      if (!res.ok) {
        alert('Player not found');
        goBack();
        return;
      }
      
      const player = await res.json();
      
      // Header
      document.getElementById('playerName').textContent = player.full_name || 'Unknown Player';
      document.getElementById('playerYear').textContent = player.graduation_year || '—';
      document.getElementById('playerPosition').textContent = player.position || '—';
      document.getElementById('playerHeight').textContent = player.height || '—';
      document.getElementById('playerWeight').textContent = player.weight ? `${player.weight} LBS` : '—';
      document.getElementById('playerSchool').textContent = player.high_school || '—';
      
      // Verified Measurables - always show all fields
      const measurableFields = [
        { label: '40-Yard Dash', value: player.forty_yard_dash || '—' },
        { label: '5-10-5 Shuttle', value: player.shuttle_5_10_5 || '—' },
        { label: 'L-Drill', value: player.l_drill || '—' },
        { label: 'Broad Jump', value: player.broad_jump ? `${player.broad_jump}"` : '—' },
        { label: 'Vertical', value: player.vertical_jump ? `${player.vertical_jump}"` : '—' },
        { label: 'Bench Press', value: player.bench_press ? `${player.bench_press} lbs` : '—' },
        { label: 'Squat', value: player.squat ? `${player.squat} lbs` : '—' },
        { label: 'Power Clean', value: player.power_clean ? `${player.power_clean} lbs` : '—' },
        { label: 'Single Leg Squat', value: player.single_leg_squat ? `${player.single_leg_squat} lbs` : '—' }
      ];
      let metricsHTML = '';
      measurableFields.forEach(f => {
        metricsHTML += `<div class="info-row"><span class="info-label">${f.label}</span><span class="info-value">${f.value}</span></div>`;
      });
      document.getElementById('measurables').innerHTML = metricsHTML;
      
      // College Offers (from school interests)
      if (player.college_offer_schools) {
        const offers = JSON.parse(player.college_offer_schools);
        if (offers.length > 0) {
          document.getElementById('offersSection').style.display = 'block';
          let offersHTML = '';
          const displayCount = Math.min(12, offers.length);
          for (let i = 0; i < displayCount; i++) {
            const logoSrc = offers[i].logo ? '/' + offers[i].logo : '';
            if (logoSrc) {
              offersHTML += `<div class="offer-logo"><img src="${logoSrc}" alt="${offers[i].name || 'College'}"></div>`;
            }
          }
          document.getElementById('collegeOffers').innerHTML = offersHTML;
          
          if (offers.length > 12) {
            document.getElementById('additionalOffers').innerHTML = `<strong>ADDITIONAL OFFERS:</strong> +${offers.length - 12} more`;
          }
        }
      }
      
      // Contact Info - always show all fields
      let contactHTML = '';
      const athleteDetails = [];
      if (player.email) athleteDetails.push(player.email);
      if (player.phone) athleteDetails.push(player.phone);
      contactHTML += `<div class="contact-item"><strong>Athlete</strong>${athleteDetails.length ? athleteDetails.join(' | ') : '—'}</div>`;
      
      const fatherName = player.father_name || '—';
      const fatherDetails = [];
      if (player.father_email) fatherDetails.push(player.father_email);
      if (player.father_phone) fatherDetails.push(player.father_phone);
      contactHTML += `<div class="contact-item"><strong>Father – ${fatherName}</strong>${fatherDetails.length ? fatherDetails.join(' | ') : '—'}</div>`;
      
      const motherName = player.mother_name || '—';
      const motherDetails = [];
      if (player.mother_email) motherDetails.push(player.mother_email);
      if (player.mother_phone) motherDetails.push(player.mother_phone);
      contactHTML += `<div class="contact-item"><strong>Mother – ${motherName}</strong>${motherDetails.length ? motherDetails.join(' | ') : '—'}</div>`;
      
      const coachName = player.coach_name || '—';
      const coachDetails = [];
      if (player.coach_email) coachDetails.push(player.coach_email);
      if (player.coach_phone) coachDetails.push(player.coach_phone);
      contactHTML += `<div class="contact-item"><strong>Head Coach – ${coachName}</strong>${coachDetails.length ? coachDetails.join(' | ') : '—'}</div>`;
      document.getElementById('contactInfo').innerHTML = contactHTML;
      
      // Social Media - always show all fields
      let socialHTML = '';
      socialHTML += `<div class="social-item"><img src="/images/logos/Hudl_logo.png" alt="Hudl" class="social-logo"><strong>Hudl:</strong> ${player.hudl_username || '—'}</div>`;
      socialHTML += `<div class="social-item"><img src="/images/logos/Instagram_logo.png" alt="Instagram" class="social-logo"><strong>Instagram:</strong> ${player.instagram_username || '—'}</div>`;
      socialHTML += `<div class="social-item"><img src="/images/logos/X_logo.png" alt="X" class="social-logo"><strong>Twitter:</strong> ${player.twitter_username || '—'}</div>`;
      document.getElementById('socialInfo').innerHTML = socialHTML;
      
      // Player Image - use card_photo if available, otherwise fall back to profile_picture
      const photoToUse = player.card_photo || player.profile_picture;
      if (photoToUse) {
        const container = document.getElementById('playerImageContainer');
        const imgUrl = `/api/upload-proxy?path=${encodeURIComponent(photoToUse)}`;
        container.style.backgroundImage = `url('${imgUrl}')`;
        
        // Detect aspect ratio to choose sizing mode
        const testImg = new Image();
        testImg.onload = function() {
          const aspectRatio = this.naturalWidth / this.naturalHeight;
          if (aspectRatio > 1.5 || aspectRatio < 0.6) {
            container.style.backgroundSize = 'contain';
            container.style.backgroundPosition = 'center';
          }
        };
        testImg.src = imgUrl;
      }
      
      // GPA Badge - always show
      document.getElementById('gpaBadge').style.display = 'block';
      if (player.gpa) {
        document.getElementById('gpaValue').textContent = player.gpa;
        const gpa = parseFloat(player.gpa);
        if (gpa >= 3.5) {
          document.querySelector('.gpa-badge .honors').textContent = 'HIGH HONORS';
        } else if (gpa >= 3.0) {
          document.querySelector('.gpa-badge .honors').textContent = 'HONORS';
        } else {
          document.querySelector('.gpa-badge .honors').textContent = '';
        }
      } else {
        document.getElementById('gpaValue').textContent = '—';
        document.querySelector('.gpa-badge .honors').textContent = '';
      }
    }
    
    function canvasToBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) {
            resolve(blob);
          } else {
            reject(new Error('Unable to create image blob from canvas'));
          }
        }, 'image/png');
      });
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Unable to read image data'));
        reader.readAsDataURL(blob);
      });
    }

    async function renderPlayerCardCanvas() {
      const cardElement = document.getElementById('playerCard');

      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (_) {}
      }

      const createOptions = (scale, removePlayerImage) => ({
        backgroundColor: '#0a1628',
        scale,
        logging: false,
        useCORS: true,
        allowTaint: false,
        imageTimeout: 15000,
        onclone: (clonedDoc) => {
          const clonedCard = clonedDoc.getElementById('playerCard');
          if (clonedCard) {
            clonedCard.style.margin = '0';
            clonedCard.style.boxShadow = '0 20px 60px rgba(0,0,0,0.5)';
          }

          const clonedImageContainer = clonedDoc.getElementById('playerImageContainer');
          if (removePlayerImage && clonedImageContainer) {
            clonedImageContainer.style.backgroundImage = 'none';
          }
        }
      });

      const attempts = [
        { scale: 2, removePlayerImage: false },
        { scale: 1.5, removePlayerImage: true },
        { scale: 1, removePlayerImage: true }
      ];

      let lastError = null;
      for (const attempt of attempts) {
        try {
          return await html2canvas(cardElement, createOptions(attempt.scale, attempt.removePlayerImage));
        } catch (error) {
          lastError = error;
          console.warn(`Player card render failed at scale ${attempt.scale} (removePlayerImage=${attempt.removePlayerImage})`, error);
        }
      }

      throw lastError || new Error('Unable to render player card');
    }

    // Export player card as image
    async function exportAsImage() {
      const button = document.getElementById('exportBtn');
      const originalText = button.textContent;
      
      try {
        // Disable button and show loading state
        button.disabled = true;
        button.textContent = '⏳ Generating...';
        const canvas = await renderPlayerCardCanvas();
        const blob = await canvasToBlob(canvas);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        
        // Get player name for filename
        const playerName = document.getElementById('playerName').textContent.replace(/\s+/g, '_');
        a.download = `${playerName}_Player_Card.png`;
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        // Reset button
        button.disabled = false;
        button.textContent = originalText;
        
      } catch (error) {
        console.error('Error exporting image:', error);
        alert('Failed to export image. Please try again.');
        button.disabled = false;
        button.textContent = originalText;
      }
    }
    
    // Preview the image before exporting
    async function previewImage() {
      const button = document.getElementById('previewBtn');
      const originalText = button.textContent;
      
      try {
        button.disabled = true;
        button.textContent = '⏳ Generating Preview...';
        const canvas = await renderPlayerCardCanvas();

        const blob = await canvasToBlob(canvas);
        if (previewObjectUrl) {
          URL.revokeObjectURL(previewObjectUrl);
        }
        previewObjectUrl = URL.createObjectURL(blob);
        document.getElementById('previewImage').src = previewObjectUrl;
        document.getElementById('previewModal').style.display = 'flex';
        
        button.disabled = false;
        button.textContent = originalText;
        
      } catch (error) {
        console.error('Error generating preview:', error);
        alert('Failed to generate preview. Please try again.');
        button.disabled = false;
        button.textContent = originalText;
      }
    }
    
    function closePreview() {
      document.getElementById('previewModal').style.display = 'none';
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = null;
      }
      document.getElementById('previewImage').src = '';
    }
    
    function openEmailModal() {
      const playerName = document.getElementById('playerName').textContent;
      document.getElementById('emailSubject').value = `${playerName} - Player Card`;
      document.getElementById('emailMessage').value = `Please see the attached player card for ${playerName}.`;
      document.getElementById('emailTo').value = '';
      document.getElementById('emailModal').style.display = 'flex';
      document.getElementById('emailTo').focus();
    }

    function closeEmailModal() {
      document.getElementById('emailModal').style.display = 'none';
    }

    async function sendPlayerCardEmail() {
      const recipientEmail = document.getElementById('emailTo').value.trim();
      const subject = document.getElementById('emailSubject').value.trim();
      const message = document.getElementById('emailMessage').value.trim();
      const btn = document.getElementById('sendEmailBtn');

      if (!recipientEmail) {
        alert('Please enter a recipient email address.');
        return;
      }

      try {
        btn.disabled = true;
        btn.textContent = '⏳ Sending...';

        // Generate the card image
        const canvas = await renderPlayerCardCanvas();
        const imageBlob = await canvasToBlob(canvas);
        const imageData = await blobToDataUrl(imageBlob);
        const playerName = document.getElementById('playerName').textContent;

        const res = await fetch('/api/send-player-card', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ recipientEmail, subject, message, imageData, playerName })
        });

        if (res.ok) {
          alert('Player card sent successfully!');
          closeEmailModal();
        } else {
          const data = await res.json();
          alert(data.error || 'Failed to send email.');
        }
      } catch (error) {
        console.error('Error sending email:', error);
        alert('Failed to send email. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Email';
      }
    }

    function exportFromPreview() {
      const img = document.getElementById('previewImage');
      const playerName = document.getElementById('playerName').textContent.replace(/\s+/g, '_');
      
      // Convert data URL to blob and download
      fetch(img.src)
        .then(res => res.blob())
        .then(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${playerName}_Player_Card.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          closePreview();
        });
    }
  </script>
</body>
