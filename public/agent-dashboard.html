<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard-wrapper">
    <header class="dashboard-header">
      <div class="header-content">
        <div class="header-left">
          <img src="/images/GridIronLogoWhiteBG.png" alt="" class="header-logo">
        </div>
        <nav class="top-nav-menu">
          <a href="agent-dashboard.html" class="nav-link">Home</a>
          <a href="messages.html" class="nav-link">Messages</a>
          <a href="agent-profile.html" class="nav-link">My Profile</a>
          <a href="#" onclick="logout(); return false;" class="nav-link">Sign out</a>
        </nav>
      </div>
    </header>

    <div class="dashboard-container">

    <div class="filters">
      <!-- Quick Search Bar with Filters Button -->
      <div style="margin-bottom: 25px;">
        <div style="display: flex; gap: 12px; align-items: center;">
          <div class="filter-group" style="flex: 1;">
            <div class="search-input-wrapper">
              <span class="search-icon">🔍</span>
              <input type="text" id="quickSearch" class="search-input-with-icon" placeholder="Search by name, school, or position...">
            </div>
          </div>
          <button class="favorites-filter-btn" id="favoritesFilterBtn" onclick="toggleFavoritesFilter()">
            <span id="favoritesFilterIcon">☆</span> Favorites
          </button>
          <button onclick="toggleAdvancedFilters()" class="filters-toggle-btn" id="filtersToggleBtn">
            <span>Filters</span>
            <span id="filterIcon">▼</span>
          </button>
        </div>
      </div>
      
      <!-- Advanced Filters Section -->
      <div id="advancedFilters" style="display: none;">
        <h3 style="color: #333; font-size: 16px; margin-bottom: 15px; font-weight: 600;">Advanced Filters</h3>
        <div class="filter-grid">
        <div class="filter-group">
          <label>Position</label>
          <select id="filterPosition">
            <option value="">All Positions</option>
            <option value="QB">Quarterback</option>
            <option value="RB">Running Back</option>
            <option value="WR">Wide Receiver</option>
            <option value="TE">Tight End</option>
            <option value="OL">Offensive Line</option>
            <option value="DL">Defensive Line</option>
            <option value="LB">Linebacker</option>
            <option value="CB">Cornerback</option>
            <option value="S">Safety</option>
            <option value="K">Kicker</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>Grad Year</label>
          <input type="number" id="filterYear" placeholder="2025">
        </div>
        
        <div class="filter-group">
          <label>Min GPA</label>
          <input type="number" step="0.1" id="filterGpa" placeholder="3.0" min="0" max="4.0">
        </div>
        
        <div class="filter-group">
          <label>Max 40-Yard</label>
          <input type="number" step="0.01" id="filterForty" placeholder="4.5">
        </div>
        
        <div class="filter-group">
          <label>Min Height</label>
          <input type="text" id="filterHeight" placeholder="6'0">
        </div>
        
        <div class="filter-group">
          <label>Min Weight</label>
          <input type="number" id="filterWeight" placeholder="180">
        </div>
        
        <div class="filter-group">
          <label>Min Vertical</label>
          <input type="number" step="0.5" id="filterVertical" placeholder="30">
        </div>
        
        <div class="filter-group">
          <label>Min Bench</label>
          <input type="number" id="filterBench" placeholder="225">
        </div>
        
        <div class="filter-group">
          <label>Min Squat</label>
          <input type="number" id="filterSquat" placeholder="315">
        </div>
        
        <div class="filter-group">
          <label>Max Shuttle</label>
          <input type="number" step="0.01" id="filterShuttle" placeholder="4.2">
        </div>
        
        <div class="filter-group">
          <label>Max L-Drill</label>
          <input type="number" step="0.01" id="filterLDrill" placeholder="7.0">
        </div>
        
        <div class="filter-group">
          <label>Min Broad Jump</label>
          <input type="number" id="filterBroadJump" placeholder="110">
        </div>
      </div>
      
      <div class="filter-actions">
        <div style="display: flex; gap: 10px;">
          <button onclick="loadPlayers()" class="search-btn">
            <span>Search</span>
          </button>
          <button onclick="clearFilters()" class="clear-btn">
            <span>Reset</span>
          </button>
        </div>
      </div>
      </div>
      <!-- End Advanced Filters -->
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
        <span id="lastUpdate" class="last-update"></span>
        <div class="results-count" id="resultsCount"></div>
      </div>
    </div>

    <div id="playersList"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    checkAuth('agent');
    loadPlayers();
    
    // Toggle advanced filters
    function toggleAdvancedFilters() {
      const advancedFilters = document.getElementById('advancedFilters');
      const filterIcon = document.getElementById('filterIcon');
      const filterBtn = document.getElementById('filtersToggleBtn');
      
      if (advancedFilters.style.display === 'none') {
        advancedFilters.style.display = 'block';
        filterIcon.textContent = '▲';
        filterBtn.classList.add('active');
      } else {
        advancedFilters.style.display = 'none';
        filterIcon.textContent = '▼';
        filterBtn.classList.remove('active');
      }
    }
    
    // Toggle favorites filter
    function toggleFavoritesFilter() {
      const btn = document.getElementById('favoritesFilterBtn');
      const icon = document.getElementById('favoritesFilterIcon');
      
      if (btn.classList.contains('active')) {
        btn.classList.remove('active');
        icon.textContent = '☆';
      } else {
        btn.classList.add('active');
        icon.textContent = '⭐';
      }
      
      loadPlayers();
    }
    
    // Add auto-search functionality to quick search input
    document.getElementById('quickSearch').addEventListener('input', function() {
      loadPlayers();
    });
    
    // Add auto-search when position is selected
    document.getElementById('filterPosition').addEventListener('change', function() {
      loadPlayers();
    });
    
    // Add Enter key handler for advanced filter fields
    document.addEventListener('DOMContentLoaded', function() {
      const filterFields = [
        'filterPosition', 'filterYear', 'filterGpa', 'filterForty',
        'filterHeight', 'filterWeight', 'filterVertical', 'filterBench',
        'filterSquat', 'filterShuttle', 'filterLDrill', 'filterBroadJump'
      ];
      
      filterFields.forEach(fieldId => {
        const field = document.getElementById(fieldId);
        if (field) {
          field.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
              event.preventDefault();
              loadPlayers();
            }
          });
        }
      });
    });

    function clearFilters() {
      document.getElementById('quickSearch').value = '';
      document.getElementById('filterPosition').value = '';
      document.getElementById('filterYear').value = '';
      document.getElementById('filterGpa').value = '';
      document.getElementById('filterForty').value = '';
      document.getElementById('filterHeight').value = '';
      document.getElementById('filterWeight').value = '';
      document.getElementById('filterVertical').value = '';
      document.getElementById('filterBench').value = '';
      document.getElementById('filterSquat').value = '';
      document.getElementById('filterShuttle').value = '';
      document.getElementById('filterLDrill').value = '';
      document.getElementById('filterBroadJump').value = '';
      loadPlayers();
    }

    async function loadPlayers() {
      const position = document.getElementById('filterPosition').value;
      const year = document.getElementById('filterYear').value;
      const gpa = document.getElementById('filterGpa').value;
      const forty = document.getElementById('filterForty').value;
      const height = document.getElementById('filterHeight').value;
      const weight = document.getElementById('filterWeight').value;
      const vertical = document.getElementById('filterVertical').value;
      const bench = document.getElementById('filterBench').value;
      const squat = document.getElementById('filterSquat').value;
      const shuttle = document.getElementById('filterShuttle').value;
      const lDrill = document.getElementById('filterLDrill').value;
      const broadJump = document.getElementById('filterBroadJump').value;
      const quickSearch = document.getElementById('quickSearch').value.toLowerCase().trim();
      const favoritesOnly = document.getElementById('favoritesFilterBtn').classList.contains('active');
      
      const params = new URLSearchParams();
      if (position) params.append('position', position);
      if (year) params.append('graduationYear', year);
      if (gpa) params.append('minGpa', gpa);
      if (favoritesOnly) params.append('favoritesOnly', 'true');
      
      // Add timestamp to prevent caching
      params.append('_t', Date.now());
      
      console.log('Fetching players at:', new Date().toISOString());
      
      const res = await fetch('/api/agent/players?' + params, {
        cache: 'no-store',
        headers: {
          'Cache-Control': 'no-cache',
          'Pragma': 'no-cache'
        }
      });
      let players = await res.json();
      
      // Load favorites list
      const favoritesRes = await fetch('/api/agent/favorites');
      const favoriteIds = await favoritesRes.json();
      
      // Quick search filter - searches across multiple fields
      if (quickSearch) {
        players = players.filter(p => {
          const searchableText = [
            p.full_name,
            p.high_school,
            p.position,
            p.bio,
            p.graduation_year?.toString(),
            p.height,
            p.weight?.toString(),
            p.gpa?.toString()
          ].filter(Boolean).join(' ').toLowerCase();
          
          return searchableText.includes(quickSearch);
        });
      }
      
      // Client-side filtering for additional criteria
      if (forty) {
        players = players.filter(p => p.forty_yard_dash && parseFloat(p.forty_yard_dash) <= parseFloat(forty));
      }
      if (height) {
        players = players.filter(p => p.height && p.height >= height);
      }
      if (weight) {
        players = players.filter(p => p.weight && parseInt(p.weight) >= parseInt(weight));
      }
      if (vertical) {
        players = players.filter(p => p.vertical_jump && parseFloat(p.vertical_jump) >= parseFloat(vertical));
      }
      if (bench) {
        players = players.filter(p => p.bench_press && parseInt(p.bench_press) >= parseInt(bench));
      }
      if (squat) {
        players = players.filter(p => p.squat && parseInt(p.squat) >= parseInt(squat));
      }
      if (shuttle) {
        players = players.filter(p => p.shuttle_5_10_5 && parseFloat(p.shuttle_5_10_5) <= parseFloat(shuttle));
      }
      if (lDrill) {
        players = players.filter(p => p.l_drill && parseFloat(p.l_drill) <= parseFloat(lDrill));
      }
      if (broadJump) {
        players = players.filter(p => p.broad_jump && parseFloat(p.broad_jump) >= parseFloat(broadJump));
      }
      
      console.log('Loaded players:', players.length);
      
      // Update last refresh time and results count
      document.getElementById('lastUpdate').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
      document.getElementById('resultsCount').textContent = `${players.length} player${players.length !== 1 ? 's' : ''} found`;
      
      const list = document.getElementById('playersList');
      if (players.length === 0) {
        list.innerHTML = '<p class="no-results">No players found matching your criteria</p>';
        return;
      }
      
      list.innerHTML = '<div class="players-grid">' + players.map(p => {
        const isFavorite = favoriteIds.includes(p.user_id);
        return `
        <div class="player-card-compact">
          <div onclick="window.location.href='player-detail.html?id=${p.id}'" style="cursor: pointer;">
            <div class="player-card-header">
              ${p.profile_picture ? 
                `<img src="/uploads/${p.profile_picture}" alt="${p.full_name}" class="player-card-photo">` : 
                '<div class="player-card-photo no-photo">No Photo</div>'}
            </div>
            
            <div class="player-card-body">
              <div class="player-info-section">
                <h3>${p.full_name}</h3>
                <p>${p.position || 'Position not set'}</p>
                <p>${p.high_school || 'School not set'}</p>
                <p>Class of ${p.graduation_year || 'N/A'}</p>
              </div>
              
              <div class="player-stats-compact">
                <div class="stat-item">
                  <div class="stat-label">Height</div>
                  <div class="stat-value">${p.height || 'N/A'}</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">Weight</div>
                  <div class="stat-value">${p.weight ? p.weight + ' lbs' : 'N/A'}</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">GPA</div>
                  <div class="stat-value">${p.gpa || 'N/A'}</div>
                </div>
              </div>
            </div>
          </div>
          <button class="favorite-star-bottom ${isFavorite ? 'favorited' : ''}" 
                  onclick="event.stopPropagation(); toggleFavorite(${p.user_id}, this)"
                  title="${isFavorite ? 'Remove from favorites' : 'Add to favorites'}">
            ${isFavorite ? '⭐' : '☆'} ${isFavorite ? 'Favorited' : 'Add to Favorites'}
          </button>
        </div>
      `;
      }).join('') + '</div>';
    }
    
    async function toggleFavorite(playerId, button) {
      const isFavorite = button.classList.contains('favorited');
      
      try {
        if (isFavorite) {
          await fetch(`/api/agent/favorites/${playerId}`, { method: 'DELETE' });
          button.classList.remove('favorited');
          button.innerHTML = '☆ Add to Favorites';
          button.title = 'Add to favorites';
        } else {
          await fetch(`/api/agent/favorites/${playerId}`, { method: 'POST' });
          button.classList.add('favorited');
          button.innerHTML = '⭐ Favorited';
          button.title = 'Remove from favorites';
        }
        
        // Reload if showing favorites only
        if (document.getElementById('favoritesFilterBtn').classList.contains('active')) {
          loadPlayers();
        }
      } catch (error) {
        console.error('Error toggling favorite:', error);
        alert('Failed to update favorite');
      }
    }
  </script>
</body>
</html>
