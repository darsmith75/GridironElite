<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🏈 Agent Dashboard</h1>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </header>

    <div class="filters">
      <div class="filter-header">
        <h3>🔍 Filter Players</h3>
        <div class="results-count" id="resultsCount"></div>
      </div>
      
      <div class="filter-grid">
        <div class="filter-group">
          <label>🏈 Position</label>
          <select id="filterPosition">
            <option value="">All Positions</option>
            <option value="QB">Quarterback</option>
            <option value="RB">Running Back</option>
            <option value="WR">Wide Receiver</option>
            <option value="TE">Tight End</option>
            <option value="OL">Offensive Line</option>
            <option value="DL">Defensive Line</option>
            <option value="LB">Linebacker</option>
            <option value="CB">Cornerback</option>
            <option value="S">Safety</option>
            <option value="K">Kicker</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>🎓 Grad Year</label>
          <input type="number" id="filterYear" placeholder="2025">
        </div>
        
        <div class="filter-group">
          <label>📊 Min GPA</label>
          <input type="number" step="0.1" id="filterGpa" placeholder="3.0" min="0" max="4.0">
        </div>
        
        <div class="filter-group">
          <label>⚡ Max 40-Yard</label>
          <input type="number" step="0.01" id="filterForty" placeholder="4.5">
        </div>
        
        <div class="filter-group">
          <label>📏 Min Height</label>
          <input type="text" id="filterHeight" placeholder="6'0">
        </div>
        
        <div class="filter-group">
          <label>⚖️ Min Weight</label>
          <input type="number" id="filterWeight" placeholder="180">
        </div>
        
        <div class="filter-group">
          <label>🦘 Min Vertical</label>
          <input type="number" step="0.5" id="filterVertical" placeholder="30">
        </div>
        
        <div class="filter-group">
          <label>💪 Min Bench</label>
          <input type="number" id="filterBench" placeholder="225">
        </div>
        
        <div class="filter-group">
          <label>🏋️ Min Squat</label>
          <input type="number" id="filterSquat" placeholder="315">
        </div>
        
        <div class="filter-group">
          <label>🔀 Max Shuttle</label>
          <input type="number" step="0.01" id="filterShuttle" placeholder="4.2">
        </div>
        
        <div class="filter-group">
          <label>📐 Max L-Drill</label>
          <input type="number" step="0.01" id="filterLDrill" placeholder="7.0">
        </div>
        
        <div class="filter-group">
          <label>🦘 Min Broad Jump</label>
          <input type="number" id="filterBroadJump" placeholder="110">
        </div>
      </div>
      
      <div class="filter-actions">
        <button onclick="loadPlayers()" class="search-btn">
          <span class="btn-icon">🔍</span>
          <span>Search</span>
        </button>
        <button onclick="clearFilters()" class="clear-btn">
          <span class="btn-icon">↺</span>
          <span>Reset</span>
        </button>
      </div>
      
      <div class="filter-footer">
        <span id="lastUpdate" class="last-update"></span>
      </div>
    </div>

    <div id="playersList"></div>
  </div>

  <script src="app.js"></script>
  <script>
    checkAuth('agent');
    loadPlayers();

    function clearFilters() {
      document.getElementById('filterPosition').value = '';
      document.getElementById('filterYear').value = '';
      document.getElementById('filterGpa').value = '';
      document.getElementById('filterForty').value = '';
      document.getElementById('filterHeight').value = '';
      document.getElementById('filterWeight').value = '';
      document.getElementById('filterVertical').value = '';
      document.getElementById('filterBench').value = '';
      document.getElementById('filterSquat').value = '';
      document.getElementById('filterShuttle').value = '';
      document.getElementById('filterLDrill').value = '';
      document.getElementById('filterBroadJump').value = '';
      loadPlayers();
    }

    async function loadPlayers() {
      const position = document.getElementById('filterPosition').value;
      const year = document.getElementById('filterYear').value;
      const gpa = document.getElementById('filterGpa').value;
      const forty = document.getElementById('filterForty').value;
      const height = document.getElementById('filterHeight').value;
      const weight = document.getElementById('filterWeight').value;
      const vertical = document.getElementById('filterVertical').value;
      const bench = document.getElementById('filterBench').value;
      const squat = document.getElementById('filterSquat').value;
      const shuttle = document.getElementById('filterShuttle').value;
      const lDrill = document.getElementById('filterLDrill').value;
      const broadJump = document.getElementById('filterBroadJump').value;
      
      const params = new URLSearchParams();
      if (position) params.append('position', position);
      if (year) params.append('graduationYear', year);
      if (gpa) params.append('minGpa', gpa);
      
      // Add timestamp to prevent caching
      params.append('_t', Date.now());
      
      console.log('Fetching players at:', new Date().toISOString());
      
      const res = await fetch('/api/agent/players?' + params, {
        cache: 'no-store',
        headers: {
          'Cache-Control': 'no-cache',
          'Pragma': 'no-cache'
        }
      });
      let players = await res.json();
      
      // Client-side filtering for additional criteria
      if (forty) {
        players = players.filter(p => p.forty_yard_dash && parseFloat(p.forty_yard_dash) <= parseFloat(forty));
      }
      if (height) {
        players = players.filter(p => p.height && p.height >= height);
      }
      if (weight) {
        players = players.filter(p => p.weight && parseInt(p.weight) >= parseInt(weight));
      }
      if (vertical) {
        players = players.filter(p => p.vertical_jump && parseFloat(p.vertical_jump) >= parseFloat(vertical));
      }
      if (bench) {
        players = players.filter(p => p.bench_press && parseInt(p.bench_press) >= parseInt(bench));
      }
      if (squat) {
        players = players.filter(p => p.squat && parseInt(p.squat) >= parseInt(squat));
      }
      if (shuttle) {
        players = players.filter(p => p.shuttle_5_10_5 && parseFloat(p.shuttle_5_10_5) <= parseFloat(shuttle));
      }
      if (lDrill) {
        players = players.filter(p => p.l_drill && parseFloat(p.l_drill) <= parseFloat(lDrill));
      }
      if (broadJump) {
        players = players.filter(p => p.broad_jump && parseFloat(p.broad_jump) >= parseFloat(broadJump));
      }
      
      console.log('Loaded players:', players.length);
      
      // Update last refresh time and results count
      document.getElementById('lastUpdate').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
      document.getElementById('resultsCount').textContent = `${players.length} player${players.length !== 1 ? 's' : ''} found`;
      
      const list = document.getElementById('playersList');
      if (players.length === 0) {
        list.innerHTML = '<p class="no-results">No players found matching your criteria</p>';
        return;
      }
      
      list.innerHTML = '<div class="players-grid">' + players.map(p => `
        <div class="player-card-compact" onclick="window.location.href='player-detail.html?id=${p.id}'">
          <div class="player-card-header">
            ${p.profile_picture ? 
              `<img src="/uploads/${p.profile_picture}" alt="${p.full_name}" class="player-card-photo">` : 
              '<div class="player-card-photo no-photo">No Photo</div>'}
            <h3>${p.full_name}</h3>
            <p>${p.position || 'Position not set'}</p>
            <p>${p.high_school || 'School not set'}</p>
            <p>Class of ${p.graduation_year || 'N/A'}</p>
          </div>
          
          <div class="player-card-body">
            <div class="player-stats-compact">
              <div class="stat-item">
                <div class="stat-label">Height</div>
                <div class="stat-value">${p.height || 'N/A'}</div>
              </div>
              <div class="stat-item">
                <div class="stat-label">Weight</div>
                <div class="stat-value">${p.weight ? p.weight + ' lbs' : 'N/A'}</div>
              </div>
              <div class="stat-item">
                <div class="stat-label">40-Yard</div>
                <div class="stat-value">${p.forty_yard_dash ? p.forty_yard_dash + 's' : 'N/A'}</div>
              </div>
              <div class="stat-item">
                <div class="stat-label">Vertical</div>
                <div class="stat-value">${p.vertical_jump ? p.vertical_jump + '"' : 'N/A'}</div>
              </div>
              <div class="stat-item">
                <div class="stat-label">GPA</div>
                <div class="stat-value">${p.gpa || 'N/A'}</div>
              </div>
            </div>
          </div>
        </div>
      `).join('') + '</div>';
    }
  </script>
</body>
</html>
