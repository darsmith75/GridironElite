<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Gridiron Elite</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
  <div class="login-container" style="grid-template-columns: 1fr; max-width: 560px;">
    <div class="login-right" style="padding: 44px;">
      <div class="login-card" style="max-width: 100%;">
        <div class="login-header">
          <h2>Reset your password</h2>
          <p>Choose a new password for your account</p>
        </div>

        <div id="resetMessage" class="auth-message" style="display:none;" aria-live="polite"></div>

        <div class="auth-form">
          <div class="input-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password" minlength="8" required>
          </div>
          <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password" minlength="8" required>
          </div>
          <button id="resetBtn" class="primary-btn" type="button">Update Password</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function setResetMessage(message, type) {
      const messageEl = document.getElementById('resetMessage');
      messageEl.textContent = message;
      messageEl.className = 'auth-message ' + (type || 'info');
      messageEl.style.display = 'block';
    }

    async function submitReset() {
      const token = new URLSearchParams(window.location.search).get('token');
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!token) {
        setResetMessage('Missing reset token. Please use the link from your email.', 'error');
        return;
      }
      if (newPassword.length < 8) {
        setResetMessage('Password must be at least 8 characters long.', 'error');
        return;
      }
      if (newPassword !== confirmPassword) {
        setResetMessage('Passwords do not match.', 'error');
        return;
      }

      const response = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword })
      });
      const data = await response.json();

      if (response.ok) {
        setResetMessage(data.message || 'Password updated successfully.', 'success');
        setTimeout(function () {
          window.location.href = '/';
        }, 1200);
      } else {
        setResetMessage(data.error || 'Unable to reset password.', 'error');
      }
    }

    document.getElementById('resetBtn').addEventListener('click', submitReset);
  </script>
</body>
</html>
