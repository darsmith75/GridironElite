<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard-wrapper">
    <header class="dashboard-header">
      <div class="header-content">
        <div class="header-left">
          <img src="/images/GridIronLogoWhiteBG.png" alt="" class="header-logo">
        </div>
        <nav class="top-nav-menu">
          <a href="agent-dashboard.html" class="nav-link">Home</a>
          <a href="messages.html" class="nav-link">Messages</a>
          <a href="agent-profile.html" class="nav-link">My Profile</a>
          <a href="#" onclick="logout(); return false;" class="nav-link">Sign out</a>
        </nav>
      </div>
    </header>

    <div class="dashboard-container">
      <div class="profile-page-container">
        <div class="profile-section">
          <h2 class="section-title-small">AGENT PROFILE</h2>
          
          <form id="agentProfileForm">
            <div class="form-grid">
              <div class="form-section">
                <h3>👤 Personal Information</h3>
                <label>Full Name:</label>
                <input type="text" name="fullName" id="agentFullName" placeholder="Full Name" required>
                
                <label>Email:</label>
                <input type="email" name="email" id="agentEmail" placeholder="Email" required>
                
                <label>Phone:</label>
                <input type="tel" name="phone" id="agentPhone" placeholder="Phone Number">
              </div>

              <div class="form-section">
                <h3>🏢 Professional Information</h3>
                <label>Organization:</label>
                <input type="text" name="organization" id="agentOrganization" placeholder="Organization/Agency">
                
                <label>Title:</label>
                <input type="text" name="title" id="agentTitle" placeholder="Title/Position">
                
                <label>Years of Experience:</label>
                <input type="number" name="experience" id="agentExperience" placeholder="Years">
              </div>
                <div class="form-section" style="display: flex; flex-direction: column; align-items: center; margin-bottom: 10px;">
                  <h3>🖼️ Profile Photo</h3>
                  <img id="agentProfilePicture" src="/uploads/default-profile.png" alt="Profile Picture" style="width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 2px solid #ccc; margin-bottom: 10px;">
                  <input type="file" id="agentProfilePictureInput" accept="image/*">
                </div>

              <div class="form-section full-width">
                <h3>📝 Bio</h3>
                <label>About You:</label>
                <textarea name="bio" id="agentBio" rows="4" placeholder="Tell us about your experience and what you're looking for in athletes..."></textarea>
              </div>
            </div>

            <button type="submit" class="submit-btn">💾 Save Profile</button>
          </form>
        </div>

        <div class="profile-section">
          <h2 class="section-title-small">CHANGE PASSWORD</h2>
          
          <form id="changePasswordForm">
            <div class="form-grid">
              <div class="form-section">
                <label>Current Password:</label>
                <input type="password" name="currentPassword" placeholder="Current Password" required>
                
                <label>New Password:</label>
                <input type="password" name="newPassword" placeholder="New Password" required>
                
                <label>Confirm New Password:</label>
                <input type="password" name="confirmPassword" placeholder="Confirm New Password" required>
              </div>
            </div>

            <button type="submit" class="submit-btn">🔒 Update Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    checkAuth('agent');
    loadAgentProfile();

    document.getElementById('agentProfilePictureInput').addEventListener('change', function () {
      const file = this.files && this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        document.getElementById('agentProfilePicture').src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    async function loadAgentProfile() {
      try {
        const res = await fetch('/api/agent/profile');
        if (res.ok) {
          const profile = await res.json();
          if (profile.email) {
            document.getElementById('agentEmail').value = profile.email;
            document.getElementById('agentFullName').value = profile.full_name || '';
            document.getElementById('agentPhone').value = profile.phone || '';
            document.getElementById('agentOrganization').value = profile.organization || '';
            document.getElementById('agentTitle').value = profile.title || '';
            document.getElementById('agentExperience').value = profile.experience || '';
            document.getElementById('agentBio').value = profile.bio || '';
            // Set profile picture
            document.getElementById('agentProfilePicture').src = profile.profile_picture ? '/uploads/' + profile.profile_picture : '/uploads/default-profile.png';
          }
        }
      } catch (error) {
        console.error('Error loading profile:', error);
      }
    }

    document.getElementById('agentProfileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData();
      formData.append('fullName', document.getElementById('agentFullName').value);
      formData.append('email', document.getElementById('agentEmail').value);
      formData.append('phone', document.getElementById('agentPhone').value);
      formData.append('organization', document.getElementById('agentOrganization').value);
      formData.append('title', document.getElementById('agentTitle').value);
      formData.append('experience', document.getElementById('agentExperience').value);
      formData.append('bio', document.getElementById('agentBio').value);
      const pictureInput = document.getElementById('agentProfilePictureInput');
      if (pictureInput.files && pictureInput.files[0]) {
        formData.append('profilePicture', pictureInput.files[0]);
      }
      try {
        const res = await fetch('/api/agent/profile', {
          method: 'POST',
          body: formData
        });
        if (res.ok) {
          alert('Profile updated successfully!');
          loadAgentProfile();
        } else {
          alert('Error updating profile');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error updating profile');
      }
    });

    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const currentPassword = e.target.currentPassword.value;
      const newPassword = e.target.newPassword.value;
      const confirmPassword = e.target.confirmPassword.value;
      
      if (newPassword !== confirmPassword) {
        alert('New passwords do not match!');
        return;
      }
      
      if (newPassword.length < 6) {
        alert('Password must be at least 6 characters long');
        return;
      }
      
      try {
        const res = await fetch('/api/agent/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ currentPassword, newPassword })
        });
        
        if (res.ok) {
          alert('Password updated successfully!');
          e.target.reset();
        } else {
          const error = await res.text();
          alert(error || 'Error updating password');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error updating password');
      }
    });
  </script>
</body>
</html>
