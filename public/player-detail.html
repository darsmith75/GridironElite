<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard-wrapper">
    <header class="dashboard-header">
      <div class="header-content">
        <div class="header-left">
          <img src="/images/GridIronLogoWhiteBG.png" alt="" class="header-logo">
        </div>
        <nav class="top-nav-menu">
          <a href="agent-dashboard.html" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V10.5z"/><path d="M9 21V13h6v8"/></svg>
            Home
          </a>
          <a href="messages.html" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
            Messages
          </a>
          <a href="agent-profile.html" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.866 3.582-7 8-7s8 3.134 8 7"/></svg>
            My Profile
          </a>
          <a href="#" onclick="logout(); return false;" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign out
          </a>
        </nav>
      </div>
    </header>

    <div class="dashboard-container">
      <div id="playerDetail"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    checkAuth('agent');
    let reportCardPreviewEl = null;
    const DETAIL_METRICS = [
      { key: 'forty_yard_dash', label: '40-Yard Dash', suffix: 's' },
      { key: 'vertical_jump', label: 'Vertical Jump', suffix: '"' },
      { key: 'bench_press', label: 'Bench Press', suffix: ' lbs' },
      { key: 'squat', label: 'Squat', suffix: ' lbs' },
      { key: 'shuttle_5_10_5', label: '5-10-5 Shuttle', suffix: 's' },
      { key: 'l_drill', label: 'L-Drill', suffix: 's' },
      { key: 'broad_jump', label: 'Broad Jump', suffix: '"' },
      { key: 'power_clean', label: 'Power Clean', suffix: ' lbs' },
      { key: 'single_leg_squat', label: 'Single Leg Squat', suffix: ' lbs' }
    ];
    
    const urlParams = new URLSearchParams(window.location.search);
    const playerId = urlParams.get('id');
    
    if (!playerId) {
      window.location.href = 'agent-dashboard.html';
    }
    
    loadPlayerDetail();

    function showReportCardPreview(event, imageUrl) {
      hideReportCardPreview();

      reportCardPreviewEl = document.createElement('div');
      reportCardPreviewEl.style.cssText = 'position:fixed; z-index:10001; background:#fff; border:1px solid #c7d0da; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.18); padding:8px; pointer-events:none;';
      reportCardPreviewEl.innerHTML = `
        <img src="${imageUrl}" alt="Report Card Preview" style="display:block; width:320px; max-width:50vw; max-height:60vh; object-fit:contain; border-radius:6px;">
      `;
      document.body.appendChild(reportCardPreviewEl);

      moveReportCardPreview(event);
    }

    function moveReportCardPreview(event) {
      if (!reportCardPreviewEl) return;

      const offset = 12;
      const rect = reportCardPreviewEl.getBoundingClientRect();
      let left = event.clientX + offset;
      let top = event.clientY + offset;

      if (left + rect.width > window.innerWidth - 10) {
        left = event.clientX - rect.width - offset;
      }
      if (top + rect.height > window.innerHeight - 10) {
        top = window.innerHeight - rect.height - 10;
      }
      if (top < 10) {
        top = 10;
      }

      reportCardPreviewEl.style.left = left + 'px';
      reportCardPreviewEl.style.top = top + 'px';
    }

    function hideReportCardPreview() {
      if (reportCardPreviewEl) {
        reportCardPreviewEl.remove();
        reportCardPreviewEl = null;
      }
    }

    function getMetricVideoMap(player) {
      const map = {};
      if (!player || !player.metric_videos) return map;
      try {
        const list = JSON.parse(player.metric_videos);
        list.forEach(item => {
          if (item && item.metric_key) {
            map[item.metric_key] = item;
          }
        });
      } catch (_) {}
      return map;
    }

    function buildDetailMetricCard(player, metric, metricVideoMap) {
      const value = player[metric.key];
      if (!value) return '';
      const media = metricVideoMap[metric.key] || null;
      const hasVideo = !!(media && media.video_filename);
      const isVerified = !!(media && media.is_verified);
      const verifiedBy = media && media.verified_by ? `Verified by ${media.verified_by}` : 'Verified by third party';
      const cardAttrs = hasVideo
        ? ` role="button" tabindex="0" title="View ${metric.label} video" onclick="openMetricVideoLightbox('/uploads/${media.video_filename}', '${metric.label.replace(/'/g, '&#39;')}')" onkeydown="if(event.key === 'Enter' || event.key === ' '){event.preventDefault();openMetricVideoLightbox('/uploads/${media.video_filename}', '${metric.label.replace(/'/g, '&#39;')}');}"`
        : '';
      return `
        <div class="metric-item ${hasVideo ? 'metric-item-clickable' : ''}"${cardAttrs}>
          <div class="metric-label-row">
            <div class="metric-label">${metric.label}</div>
            ${isVerified ? `<span class="metric-verified-star" title="${verifiedBy}">★</span>` : ''}
          </div>
          <div class="metric-value">${value}${metric.suffix}</div>
          ${hasVideo ? '<div class="metric-video-hint">View Video</div>' : ''}
        </div>
      `;
    }
    
    function getEmbedUrl(url) {
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtube.com') && u.searchParams.get('v')) {
          return `https://www.youtube.com/embed/${u.searchParams.get('v')}`;
        }
        if (u.hostname === 'youtu.be') {
          return `https://www.youtube.com/embed${u.pathname}`;
        }
        const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
        if (vimeoMatch) {
          return `https://player.vimeo.com/video/${vimeoMatch[1]}`;
        }
        if (u.hostname.includes('hudl.com') && url.includes('/video/')) {
          return url.replace('/video/', '/embed/video/');
        }
        return null;
      } catch { return null; }
    }

    async function loadPlayerDetail() {
      const res = await fetch(`/api/agent/player/${playerId}`, {
        cache: 'no-store',
        headers: {
          'Cache-Control': 'no-cache',
          'Pragma': 'no-cache'
        }
      });
      
      if (!res.ok) {
        document.getElementById('playerDetail').innerHTML = '<p class="no-results">Player not found</p>';
        return;
      }
      
      const player = await res.json();
      currentPlayerData = player; // Store for messaging
      const metricVideoMap = getMetricVideoMap(player);
      
      document.getElementById('playerDetail').innerHTML = `
        <div class="profile-container">
          <!-- Hero Section with Gradient Background -->
          <div class="profile-hero">
            <div class="hero-gradient"></div>
            <div class="profile-photo-wrapper">
              ${player.profile_picture ? 
                `<img src="/uploads/${player.profile_picture}" alt="${player.full_name}" class="profile-photo-large">` : 
                '<div class="profile-photo-large no-photo">No Photo</div>'}
            </div>
          </div>
          
          <!-- Player Header Info -->
          <div class="profile-header-info">
            <h1 class="player-name-large">${player.full_name}</h1>
            <div class="meta-badges">
              ${player.position ? `<span class="meta-badge">${player.position}</span>` : ''}
              ${player.graduation_year ? `<span class="meta-badge">Class of ${player.graduation_year}</span>` : ''}
              ${player.high_school ? `<span class="meta-badge">${player.high_school}</span>` : ''}
              ${player.height ? `<span class="meta-badge">${player.height}</span>` : ''}
              ${player.weight ? `<span class="meta-badge">${player.weight} lbs</span>` : ''}
              ${player.gpa ? `<span class="meta-badge ${player.report_card_image ? 'clickable-gpa' : ''}" ${player.report_card_image ? `role="button" tabindex="0" title="Hover to preview, click to view full size" aria-label="View report card image" onmouseenter="showReportCardPreview(event, '/uploads/${player.report_card_image}')" onmouseleave="hideReportCardPreview()" onmousemove="moveReportCardPreview(event)" onclick="openLightbox('/uploads/${player.report_card_image}')" onkeydown="if(event.key === 'Enter' || event.key === ' '){event.preventDefault(); openLightbox('/uploads/${player.report_card_image}');}"` : ''}>GPA: ${player.gpa}${player.report_card_image ? ' (View)' : ''}</span>` : ''}
              ${player.achievement ? `<span class="meta-badge">Achievement: ${player.achievement}</span>` : ''}
            </div>
            <div style="margin-top: 20px;">
              <button onclick="toggleFavoriteDetail()" class="favorite-detail-btn" id="favoriteBtn">
                <span id="favoriteBtnIcon">☆</span> <span id="favoriteBtnText">Favorite</span>
              </button>
              <button onclick="startConversation()" class="message-btn" id="messageBtn">Message Player</button>
              <button onclick="viewPlayerCard()" class="player-card-btn" style="margin-left: 10px;">🏈 Player Card</button>
              <button onclick="exportPlayerData()" class="export-btn" style="margin-left: 10px;">📊 Export to Excel</button>
            </div>
          </div>
          
          ${player.bio ? `
            <div class="profile-section">
              <h2 class="section-title-small">ABOUT</h2>
              <p class="bio-text">${player.bio}</p>
            </div>
          ` : ''}
          
          <!-- Athletic Metrics Grid -->
          <div class="profile-section">
            <h2 class="section-title-small">ATHLETIC METRICS</h2>
            <div class="metrics-grid">
              ${DETAIL_METRICS.map(metric => buildDetailMetricCard(player, metric, metricVideoMap)).join('')}
            </div>
          </div>
          
          ${(player.highlight_videos || player.video_links) ? (() => {
            const hasUploaded = player.highlight_videos && JSON.parse(player.highlight_videos).length > 0;
            const hasLinks = player.video_links && JSON.parse(player.video_links).length > 0;
            if (!hasUploaded && !hasLinks) return '';
            let videoHTML = `<div class="profile-section"><h2 class="section-title-small">HIGHLIGHT VIDEOS</h2><div class="videos-list">`;
            if (hasUploaded) {
              videoHTML += JSON.parse(player.highlight_videos).map(video =>
                `<video controls src="/uploads/${video}" class="profile-video"></video>`
              ).join('');
            }
            if (hasLinks) {
              videoHTML += JSON.parse(player.video_links).map(link => {
                const embedUrl = getEmbedUrl(link.url);
                if (embedUrl) {
                  return `<iframe src="${embedUrl}" class="profile-video" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
                }
                return `<a href="${link.url}" target="_blank" rel="noopener noreferrer" class="video-link-card">
                  <span class="video-link-icon">&#9654;</span>
                  <span class="video-link-title">${link.title || link.url}</span>
                </a>`;
              }).join('');
            }
            videoHTML += `</div></div>`;
            return videoHTML;
          })() : ''}
          
          ${player.college_offer_schools ? (() => {
            const offers = JSON.parse(player.college_offer_schools);
            return offers.length > 0 ? `
            <div class="profile-section">
              <h2 class="section-title-small">COLLEGE OFFERS</h2>
              <div class="college-offers-grid-profile">
                ${offers.map(offer => 
                  `<div class="college-logo-card" title="${offer.name || ''}">
                    ${offer.logo
                      ? `<img src="/${offer.logo}" alt="${offer.name || 'College Offer'}" class="college-logo-img">`
                      : `<div style="width:60px;height:60px;background:#f0f0f0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;">\ud83c\udfeb</div>`
                    }
                  </div>`
                ).join('')}
              </div>
            </div>
          ` : '';
          })() : ''}
          
          <!-- Social Media Links -->
          ${(player.hudl_link || player.instagram_link || player.twitter_link) ? `
            <div class="profile-section">
              <h2 class="section-title-small">SOCIAL MEDIA</h2>
              <div class="social-links">
                ${player.hudl_link ? `
                  <a href="${player.hudl_link}" target="_blank" rel="noopener noreferrer" class="social-link hudl">
                    <img src="/images/logos/Hudl_logo.png" alt="Hudl" class="social-icon-img">
                    <div class="social-info">
                      <span class="social-name">Hudl</span>
                      ${player.hudl_username ? `<span class="social-username">${player.hudl_username}</span>` : ''}
                    </div>
                  </a>
                ` : ''}
                ${player.instagram_link ? `
                  <a href="${player.instagram_link}" target="_blank" rel="noopener noreferrer" class="social-link instagram">
                    <img src="/images/logos/Instagram_logo.png" alt="Instagram" class="social-icon-img">
                    <div class="social-info">
                      <span class="social-name">Instagram</span>
                      ${player.instagram_username ? `<span class="social-username">${player.instagram_username}</span>` : ''}
                    </div>
                  </a>
                ` : ''}
                ${player.twitter_link ? `
                  <a href="${player.twitter_link}" target="_blank" rel="noopener noreferrer" class="social-link twitter">
                    <img src="/images/logos/X_logo.png" alt="X" class="social-icon-img">
                    <div class="social-info">
                      <span class="social-name">X (Twitter)</span>
                      ${player.twitter_username ? `<span class="social-username">${player.twitter_username}</span>` : ''}
                    </div>
                  </a>
                ` : ''}
              </div>
            </div>
          ` : ''}
          
          <!-- Contact Information -->
          ${(player.father_name || player.mother_name || player.coach_name) ? `
            <div class="profile-section">
              <h2 class="section-title-small">CONTACT INFORMATION</h2>
              <div class="contact-info-grid">
                ${player.father_name ? `
                  <div class="contact-card">
                    <h4>Father</h4>
                    <div class="contact-details">
                      ${player.father_name ? `<p><strong>Name:</strong> ${player.father_name}</p>` : ''}
                      ${player.father_email ? `<p><strong>Email:</strong> <a href="mailto:${player.father_email}">${player.father_email}</a></p>` : ''}
                      ${player.father_phone ? `<p><strong>Phone:</strong> <a href="tel:${player.father_phone}">${player.father_phone}</a></p>` : ''}
                    </div>
                  </div>
                ` : ''}
                ${player.mother_name ? `
                  <div class="contact-card">
                    <h4>Mother</h4>
                    <div class="contact-details">
                      ${player.mother_name ? `<p><strong>Name:</strong> ${player.mother_name}</p>` : ''}
                      ${player.mother_email ? `<p><strong>Email:</strong> <a href="mailto:${player.mother_email}">${player.mother_email}</a></p>` : ''}
                      ${player.mother_phone ? `<p><strong>Phone:</strong> <a href="tel:${player.mother_phone}">${player.mother_phone}</a></p>` : ''}
                    </div>
                  </div>
                ` : ''}
                ${player.coach_name ? `
                  <div class="contact-card">
                    <h4>Head Coach</h4>
                    <div class="contact-details">
                      ${player.coach_name ? `<p><strong>Name:</strong> ${player.coach_name}</p>` : ''}
                      ${player.coach_email ? `<p><strong>Email:</strong> <a href="mailto:${player.coach_email}">${player.coach_email}</a></p>` : ''}
                      ${player.coach_phone ? `<p><strong>Phone:</strong> <a href="tel:${player.coach_phone}">${player.coach_phone}</a></p>` : ''}
                    </div>
                  </div>
                ` : ''}
              </div>
            </div>
          ` : ''}

          ${player.additional_images ? `
            <div class="profile-section">
              <h2 class="section-title-small">IMAGES</h2>
              <div class="images-grid-profile">
                ${JSON.parse(player.additional_images).map(img => 
                  `<img src="/uploads/${img}" alt="Player image" class="profile-image">`
                ).join('')}
              </div>
            </div>
          ` : ''}
        </div>
      `;
      
      // Check if player is favorited
      checkFavoriteStatus();
    }
    
    async function checkFavoriteStatus() {
      try {
        const res = await fetch(`/api/agent/favorites/${currentPlayerData.user_id}`);
        const data = await res.json();
        updateFavoriteButton(data.isFavorite);
      } catch (error) {
        console.error('Error checking favorite status:', error);
      }
    }
    
    function updateFavoriteButton(isFavorite) {
      const btn = document.getElementById('favoriteBtn');
      const icon = document.getElementById('favoriteBtnIcon');
      const text = document.getElementById('favoriteBtnText');
      
      if (isFavorite) {
        icon.textContent = '⭐';
        text.textContent = 'Favorite';
        btn.classList.add('favorited');
      } else {
        icon.textContent = '☆';
        text.textContent = 'Favorite';
        btn.classList.remove('favorited');
      }
    }
    
    async function toggleFavoriteDetail() {
      const btn = document.getElementById('favoriteBtn');
      const isFavorite = btn.classList.contains('favorited');
      
      try {
        if (isFavorite) {
          await fetch(`/api/agent/favorites/${currentPlayerData.user_id}`, { method: 'DELETE' });
          updateFavoriteButton(false);
        } else {
          await fetch(`/api/agent/favorites/${currentPlayerData.user_id}`, { method: 'POST' });
          updateFavoriteButton(true);
        }
      } catch (error) {
        console.error('Error toggling favorite:', error);
        alert('Failed to update favorite');
      }
    }
    
    // Lightbox functionality for images
    function openLightbox(imageSrc) {
      const lightbox = document.createElement('div');
      lightbox.className = 'lightbox';
      lightbox.innerHTML = `
        <div class="lightbox-content">
          <span class="lightbox-close">&times;</span>
          <img src="${imageSrc}" alt="Enlarged image">
        </div>
      `;
      document.body.appendChild(lightbox);
      
      // Close on click
      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox || e.target.className === 'lightbox-close') {
          document.body.removeChild(lightbox);
        }
      });
      
      // Close on escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.querySelector('.lightbox')) {
          const lb = document.querySelector('.lightbox');
          if (lb) document.body.removeChild(lb);
        }
      });
    }

    function openMetricVideoLightbox(videoSrc, titleText) {
      const lightbox = document.createElement('div');
      lightbox.className = 'lightbox';
      lightbox.innerHTML = `
        <div class="lightbox-content metric-video-lightbox">
          <span class="lightbox-close">&times;</span>
          <h3>${titleText || 'Metric Video'}</h3>
          <video src="${videoSrc}" controls autoplay playsinline class="metric-proof-video"></video>
        </div>
      `;
      document.body.appendChild(lightbox);

      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox || e.target.className === 'lightbox-close') {
          document.body.removeChild(lightbox);
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.querySelector('.lightbox')) {
          const lb = document.querySelector('.lightbox');
          if (lb) document.body.removeChild(lb);
        }
      });
    }
    
    // Add click handlers to images after they're loaded
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('profile-image')) {
        openLightbox(e.target.src);
      }
    });
    
    // Start conversation with player
    let currentPlayerData = null;
    
    async function startConversation() {
      if (currentPlayerData && currentPlayerData.user_id) {
        window.location.href = `messages.html?userId=${currentPlayerData.user_id}`;
      }
    }
    
    // Navigate to player card view
    function viewPlayerCard() {
      if (playerId) {
        window.location.href = `player-card.html?id=${playerId}`;
      }
    }
    
    // Export player data to Excel
    function exportPlayerData() {
      if (!currentPlayerData) {
        alert('No player data available to export');
        return;
      }
      
      const player = currentPlayerData;
      
      // Helper function to escape HTML/XML special characters
      function escapeXml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&apos;');
      }
      
      // Build Excel XML format
      let excel = '<?xml version="1.0" encoding="UTF-8"?>\n';
      excel += '<?mso-application progid="Excel.Sheet"?>\n';
      excel += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"\n';
      excel += ' xmlns:o="urn:schemas-microsoft-com:office:office"\n';
      excel += ' xmlns:x="urn:schemas-microsoft-com:office:excel"\n';
      excel += ' xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"\n';
      excel += ' xmlns:html="http://www.w3.org/TR/REC-html40">\n\n';
      
      // Styles
      excel += ' <Styles>\n';
      excel += '  <Style ss:ID="Header">\n';
      excel += '   <Font ss:Bold="1" ss:Size="12" ss:Color="#FFFFFF"/>\n';
      excel += '   <Interior ss:Color="#4a6fa5" ss:Pattern="Solid"/>\n';
      excel += '   <Alignment ss:Horizontal="Left" ss:Vertical="Center"/>\n';
      excel += '  </Style>\n';
      excel += '  <Style ss:ID="SectionHeader">\n';
      excel += '   <Font ss:Bold="1" ss:Size="14" ss:Color="#1e3c72"/>\n';
      excel += '   <Interior ss:Color="#e9ecef" ss:Pattern="Solid"/>\n';
      excel += '   <Alignment ss:Horizontal="Left" ss:Vertical="Center"/>\n';
      excel += '  </Style>\n';
      excel += '  <Style ss:ID="Label">\n';
      excel += '   <Font ss:Bold="1" ss:Size="10"/>\n';
      excel += '   <Alignment ss:Horizontal="Right" ss:Vertical="Center"/>\n';
      excel += '  </Style>\n';
      excel += '  <Style ss:ID="Data">\n';
      excel += '   <Alignment ss:Horizontal="Left" ss:Vertical="Center"/>\n';
      excel += '  </Style>\n';
      excel += ' </Styles>\n\n';
      
      excel += ' <Worksheet ss:Name="Player Profile">\n';
      excel += '  <Table>\n';
      excel += '   <Column ss:Width="200"/>\n';
      excel += '   <Column ss:Width="300"/>\n\n';
      
      // Helper function to add a section header
      function addSectionHeader(title) {
        return `   <Row>\n    <Cell ss:StyleID="SectionHeader" ss:MergeAcross="1"><Data ss:Type="String">${escapeXml(title)}</Data></Cell>\n   </Row>\n`;
      }
      
      // Helper function to add a data row
      function addDataRow(label, value) {
        if (value !== null && value !== undefined && value !== '') {
          return `   <Row>\n    <Cell ss:StyleID="Label"><Data ss:Type="String">${escapeXml(label)}</Data></Cell>\n    <Cell ss:StyleID="Data"><Data ss:Type="String">${escapeXml(value)}</Data></Cell>\n   </Row>\n`;
        }
        return '';
      }
      
      // Helper function to add empty row
      function addEmptyRow() {
        return '   <Row/>\n';
      }
      
      // Title Row
      excel += '   <Row>\n';
      excel += '    <Cell ss:StyleID="Header" ss:MergeAcross="1"><Data ss:Type="String">PLAYER PROFILE REPORT</Data></Cell>\n';
      excel += '   </Row>\n';
      excel += addEmptyRow();
      
      // Basic Information
      excel += addSectionHeader('BASIC INFORMATION');
      excel += addDataRow('Full Name', player.full_name);
      excel += addDataRow('Position', player.position);
      excel += addDataRow('High School', player.high_school);
      excel += addDataRow('Graduation Year', player.graduation_year);
      excel += addDataRow('Email', player.email);
      excel += addEmptyRow();
      
      // Physical Attributes
      excel += addSectionHeader('PHYSICAL ATTRIBUTES');
      excel += addDataRow('Height', player.height);
      excel += addDataRow('Weight', player.weight ? `${player.weight} lbs` : null);
      excel += addEmptyRow();
      
      // Academic Information
      if (player.gpa || player.achievement) {
        excel += addSectionHeader('ACADEMIC INFORMATION');
        excel += addDataRow('GPA', player.gpa);
        excel += addDataRow('Achievement', player.achievement);
        excel += addEmptyRow();
      }
      
      // Athletic Metrics
      const hasMetrics = player.forty_yard_dash || player.vertical_jump || player.bench_press || 
                        player.squat || player.shuttle_5_10_5 || player.l_drill || 
                        player.broad_jump || player.power_clean || player.single_leg_squat;
      
      if (hasMetrics) {
        excel += addSectionHeader('ATHLETIC METRICS');
        excel += addDataRow('40-Yard Dash', player.forty_yard_dash ? `${player.forty_yard_dash} seconds` : null);
        excel += addDataRow('Vertical Jump', player.vertical_jump ? `${player.vertical_jump} inches` : null);
        excel += addDataRow('Bench Press', player.bench_press ? `${player.bench_press} lbs` : null);
        excel += addDataRow('Squat', player.squat ? `${player.squat} lbs` : null);
        excel += addDataRow('5-10-5 Shuttle', player.shuttle_5_10_5 ? `${player.shuttle_5_10_5} seconds` : null);
        excel += addDataRow('L-Drill', player.l_drill ? `${player.l_drill} seconds` : null);
        excel += addDataRow('Broad Jump', player.broad_jump ? `${player.broad_jump} inches` : null);
        excel += addDataRow('Power Clean', player.power_clean ? `${player.power_clean} lbs` : null);
        excel += addDataRow('Single Leg Squat', player.single_leg_squat ? `${player.single_leg_squat} lbs` : null);
        excel += addEmptyRow();
      }
      
      // Biography
      if (player.bio) {
        excel += addSectionHeader('BIOGRAPHY');
        excel += addDataRow('About', player.bio);
        excel += addEmptyRow();
      }
      
      // Social Media
      const hasSocial = player.hudl_link || player.instagram_link || player.twitter_link;
      if (hasSocial) {
        excel += addSectionHeader('SOCIAL MEDIA');
        if (player.hudl_link) {
          excel += addDataRow('Hudl URL', player.hudl_link);
          excel += addDataRow('Hudl Username', player.hudl_username);
        }
        if (player.instagram_link) {
          excel += addDataRow('Instagram URL', player.instagram_link);
          excel += addDataRow('Instagram Username', player.instagram_username);
        }
        if (player.twitter_link) {
          excel += addDataRow('Twitter/X URL', player.twitter_link);
          excel += addDataRow('Twitter/X Username', player.twitter_username);
        }
        excel += addEmptyRow();
      }
      
      // Contact Information - Father
      if (player.father_name || player.father_email || player.father_phone) {
        excel += addSectionHeader('FATHER CONTACT');
        excel += addDataRow('Name', player.father_name);
        excel += addDataRow('Email', player.father_email);
        excel += addDataRow('Phone', player.father_phone);
        excel += addEmptyRow();
      }
      
      // Contact Information - Mother
      if (player.mother_name || player.mother_email || player.mother_phone) {
        excel += addSectionHeader('MOTHER CONTACT');
        excel += addDataRow('Name', player.mother_name);
        excel += addDataRow('Email', player.mother_email);
        excel += addDataRow('Phone', player.mother_phone);
        excel += addEmptyRow();
      }
      
      // Contact Information - Coach
      if (player.coach_name || player.coach_email || player.coach_phone) {
        excel += addSectionHeader('COACH CONTACT');
        excel += addDataRow('Name', player.coach_name);
        excel += addDataRow('Email', player.coach_email);
        excel += addDataRow('Phone', player.coach_phone);
        excel += addEmptyRow();
      }
      
      // Media Files
      if (player.profile_picture) {
        excel += addSectionHeader('PROFILE PICTURE');
        excel += addDataRow('Filename', player.profile_picture);
        excel += addDataRow('URL', `${window.location.origin}/uploads/${player.profile_picture}`);
        excel += addEmptyRow();
      }
      
      if (player.highlight_videos) {
        const videos = JSON.parse(player.highlight_videos);
        if (videos.length > 0) {
          excel += addSectionHeader('HIGHLIGHT VIDEOS');
          videos.forEach((video, index) => {
            excel += addDataRow(`Video ${index + 1}`, video);
            excel += addDataRow(`Video ${index + 1} URL`, `${window.location.origin}/uploads/${video}`);
          });
          excel += addEmptyRow();
        }
      }

      if (player.video_links) {
        const links = JSON.parse(player.video_links);
        if (links.length > 0) {
          excel += addSectionHeader('LINKED HIGHLIGHT VIDEOS');
          links.forEach((link, index) => {
            excel += addDataRow(`Link ${index + 1}`, link.title || '');
            excel += addDataRow(`Link ${index + 1} URL`, link.url);
          });
          excel += addEmptyRow();
        }
      }
      
      if (player.additional_images) {
        const images = JSON.parse(player.additional_images);
        if (images.length > 0) {
          excel += addSectionHeader('ADDITIONAL IMAGES');
          images.forEach((img, index) => {
            excel += addDataRow(`Image ${index + 1}`, img);
            excel += addDataRow(`Image ${index + 1} URL`, `${window.location.origin}/uploads/${img}`);
          });
          excel += addEmptyRow();
        }
      }
      
      if (player.college_offer_schools) {
        const offers = JSON.parse(player.college_offer_schools);
        if (offers.length > 0) {
          excel += addSectionHeader('COLLEGE OFFERS');
          offers.forEach((offer, index) => {
            excel += addDataRow(`Offer ${index + 1}`, offer.name || '');
            if (offer.conference) excel += addDataRow(`Conference`, offer.conference);
          });
          excel += addEmptyRow();
        }
      }
      
      excel += '  </Table>\n';
      excel += ' </Worksheet>\n';
      excel += '</Workbook>';
      
      // Create download
      const blob = new Blob([excel], { type: 'application/vnd.ms-excel' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${player.full_name.replace(/\s+/g, '_')}_Profile.xls`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
