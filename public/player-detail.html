<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Details</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🏈 Player Profile</h1>
      <div>
        <button onclick="window.location.href='agent-dashboard.html'" style="margin-right: 10px;">Back to Dashboard</button>
        <button onclick="logout()" class="logout-btn">Logout</button>
      </div>
    </header>

    <div id="playerDetail"></div>
  </div>

  <script src="app.js"></script>
  <script>
    checkAuth('agent');
    
    const urlParams = new URLSearchParams(window.location.search);
    const playerId = urlParams.get('id');
    
    if (!playerId) {
      window.location.href = 'agent-dashboard.html';
    }
    
    loadPlayerDetail();
    
    async function loadPlayerDetail() {
      const res = await fetch(`/api/agent/player/${playerId}`, {
        cache: 'no-store',
        headers: {
          'Cache-Control': 'no-cache',
          'Pragma': 'no-cache'
        }
      });
      
      if (!res.ok) {
        document.getElementById('playerDetail').innerHTML = '<p class="no-results">Player not found</p>';
        return;
      }
      
      const player = await res.json();
      
      document.getElementById('playerDetail').innerHTML = `
        <div class="player-detail-card">
          <!-- Hero Section -->
          <div class="player-hero">
            ${player.profile_picture ? 
              `<img src="/uploads/${player.profile_picture}" alt="${player.full_name}" class="hero-photo">` : 
              '<div class="hero-photo no-photo">No Photo</div>'}
            <div class="hero-info">
              <h1>${player.full_name}</h1>
              <div class="player-quick-stats">
                ${player.graduation_year || 'N/A'}
                ${player.position ? ` | ${player.position}` : ''}
                ${player.height ? ` | ${player.height}` : ''}
                ${player.weight ? ` | ${player.weight} lbs` : ''}
                ${player.high_school ? ` | ${player.high_school}` : ''}
                ${player.gpa ? ` | GPA: ${player.gpa}` : ''}
              </div>
            </div>
          </div>
          
          <!-- Stats Grid -->
          <div class="detail-section">
            <h3><span class="section-icon">📊</span> Physical Metrics</h3>
            <div class="stats-grid-detail">
              <div class="stat-card">
                <div class="stat-icon">📏</div>
                <div class="stat-label">Height</div>
                <div class="stat-value-large">${player.height || 'N/A'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">⚖️</div>
                <div class="stat-label">Weight</div>
                <div class="stat-value-large">${player.weight ? player.weight + ' lbs' : 'N/A'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-label">40-Yard Dash</div>
                <div class="stat-value-large">${player.forty_yard_dash ? player.forty_yard_dash + 's' : 'N/A'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">💪</div>
                <div class="stat-label">Bench Press</div>
                <div class="stat-value-large">${player.bench_press ? player.bench_press + ' lbs' : 'N/A'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">🏋️</div>
                <div class="stat-label">Squat</div>
                <div class="stat-value-large">${player.squat ? player.squat + ' lbs' : 'N/A'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">🦘</div>
                <div class="stat-label">Vertical Jump</div>
                <div class="stat-value-large">${player.vertical_jump ? player.vertical_jump + '"' : 'N/A'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">🏃</div>
                <div class="stat-label">5-10-5 Shuttle</div>
                <div class="stat-value-large">${player.shuttle_5_10_5 ? player.shuttle_5_10_5 + 's' : 'N/A'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">↩️</div>
                <div class="stat-label">L-Drill</div>
                <div class="stat-value-large">${player.l_drill ? player.l_drill + 's' : 'N/A'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">🦘</div>
                <div class="stat-label">Broad Jump</div>
                <div class="stat-value-large">${player.broad_jump ? player.broad_jump + '"' : 'N/A'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">🏋️</div>
                <div class="stat-label">Power Clean</div>
                <div class="stat-value-large">${player.power_clean ? player.power_clean + ' lbs' : 'N/A'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">🦵</div>
                <div class="stat-label">Single Leg Squat</div>
                <div class="stat-value-large">${player.single_leg_squat ? player.single_leg_squat + ' lbs' : 'N/A'}</div>
              </div>
            </div>
          </div>
          
          <!-- Academic Section -->
          <div class="detail-section">
            <h3><span class="section-icon">🎓</span> Academic</h3>
            <div class="stats-grid-detail">
              <div class="stat-card highlight">
                <div class="stat-icon">📚</div>
                <div class="stat-label">GPA</div>
                <div class="stat-value-large">${player.gpa || 'N/A'}</div>
              </div>
            </div>
          </div>
          
          ${player.bio ? `
            <div class="detail-section">
              <h3><span class="section-icon">📝</span> Bio</h3>
              <div class="bio-content">${player.bio}</div>
            </div>
          ` : ''}
          
          ${player.highlight_videos ? `
            <div class="detail-section">
              <h3><span class="section-icon">🎬</span> Highlight Videos</h3>
              <div class="media-grid-detail">
                ${JSON.parse(player.highlight_videos).map(video => 
                  `<div class="video-wrapper">
                    <video controls src="/uploads/${video}" class="detail-video"></video>
                  </div>`
                ).join('')}
              </div>
            </div>
          ` : ''}
          
          ${player.additional_images ? `
            <div class="detail-section">
              <h3><span class="section-icon">📸</span> Additional Images</h3>
              <div class="image-gallery-detail">
                ${JSON.parse(player.additional_images).map(img => 
                  `<img src="/uploads/${img}" alt="Player image" class="gallery-image-detail">`
                ).join('')}
              </div>
            </div>
          ` : ''}
          
          ${player.college_offers ? `
            <div class="detail-section">
              <h3><span class="section-icon">🎓</span> College Offers</h3>
              <div class="college-offers-display">
                ${JSON.parse(player.college_offers).map(offer => 
                  `<div class="college-offer-card">
                    <img src="/uploads/${offer}" alt="College Offer" class="college-offer-display-logo">
                  </div>`
                ).join('')}
              </div>
            </div>
          ` : ''}
        </div>
      `;
    }
  </script>
</body>
</html>
